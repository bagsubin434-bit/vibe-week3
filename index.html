<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe3ec 0%, #e3f0ff 50%, #eafff0 100%);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .card {
      background: #fffafc;
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow: 0 12px 30px rgba(200, 170, 200, 0.35);
      text-align: center;
      max-width: 360px;
      width: 90%;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ffd6e8;
      background: #f5f5f5;
      margin-bottom: 16px;
    }

    .name {
      font-size: 24px;
      font-weight: 700;
      color: #6b4c6b;
      margin: 8px 0 4px;
    }

    .tagline {
      font-size: 15px;
      color: #9a7ea3;
      margin-bottom: 24px;
    }

    .favorites {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .favorites li {
      background: #eaf6ff;
      color: #5b7a99;
      border-radius: 14px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
    }

    .favorites li:nth-child(2) {
      background: #fff3d6;
      color: #a3854a;
    }

    .favorites li:nth-child(3) {
      background: #e6ffe9;
      color: #5a9a6a;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Ccircle cx='60' cy='60' r='60' fill='%23ffe3ec'/%3E%3Ccircle cx='60' cy='48' r='22' fill='%23fff'/%3E%3Cpath d='M20 110c6-28 30-40 40-40s34 12 40 40' fill='%23fff'/%3E%3C/svg%3E">
    <div class="name">박수빈</div>
    <p class="tagline">코드와 커피를 좋아하는 개발자입니다 ☕</p>
    <ul class="favorites">
      <li>🎧 음악 듣기</li>
      <li>📚 책 읽기</li>
      <li>🌱 식물 키우기</li>
    </ul>
  </div>
</body>
</html>
